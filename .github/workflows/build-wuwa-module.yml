name: Build android-wuwa module

on:
  workflow_dispatch:

jobs:
  build-wuwa:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Package existing .ko into zip and add to assets
        run: |
          set -e
          mkdir -p app/src/main/assets
          ZIP_PATH=app/src/main/assets/android-wuwa-android-4.19.198.zip
          if [ -f "$ZIP_PATH" ]; then
            echo "Zip already exists at $ZIP_PATH; skipping packaging"
            ls -l "$ZIP_PATH"
          else
            # Find a .ko anywhere in the repository
            KO=$(find . -type f -name "*.ko" | head -n1)
            if [ -z "$KO" ]; then
              echo "No .ko found and no existing zip at $ZIP_PATH, aborting"
              exit 1
            fi
            echo "Found ko: $KO"
            TMP_DIR=$(mktemp -d)
            KO_ZIP_NAME=$(basename "$KO")
            cp "$KO" "$TMP_DIR/$KO_ZIP_NAME"
            (cd "$TMP_DIR" && zip "$GITHUB_WORKSPACE/$ZIP_PATH" "$KO_ZIP_NAME")
            rm -rf "$TMP_DIR"
            echo "Packaged $KO into $ZIP_PATH"
          fi

      - name: Commit and push assets
        env:
          GIT_AUTHOR_NAME: github-actions
          GIT_AUTHOR_EMAIL: actions@github.com
        run: |
          git config user.name "$GIT_AUTHOR_NAME"
          git config user.email "$GIT_AUTHOR_EMAIL"
          git add app/src/main/assets/android-wuwa-android-4.19.198.zip
          git commit -m "Add built android-wuwa module for 4.19.198 to assets" || echo "no changes to commit"
          git push origin HEAD:${{ github.ref_name }} || echo "push failed"

      - name: Upload artifact (zip)
        uses: actions/upload-artifact@v4
        with:
          name: android-wuwa-4.19.198
          path: app/src/main/assets/android-wuwa-android-4.19.198.zip
