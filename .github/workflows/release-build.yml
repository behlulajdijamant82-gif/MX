name: Android Release Build

on:
  push:
    branches: [ master ]
    paths:
      - '**/*.rs'
      - '**/*.kt'
      - '**/*.java'
      - '**/*.gradle'
      - '**/*.gradle.kts'
      - 'gradle/**'
      - 'app/src/main/rust/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: false
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Android SDK command-line tools and platforms
      run: |
        set -e
        sudo apt-get update
        sudo apt-get install -y wget unzip
        SDK_ROOT="$HOME/android-sdk"
        mkdir -p "$SDK_ROOT/cmdline-tools"
        cd "$HOME"
        # download a recent commandline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
        unzip -q cmdline-tools.zip -d cmdline-tools-tmp
        mkdir -p "$SDK_ROOT/cmdline-tools/latest"
        mv cmdline-tools-tmp/cmdline-tools/* "$SDK_ROOT/cmdline-tools/latest/"
        rm -rf cmdline-tools.zip cmdline-tools-tmp
        export ANDROID_SDK_ROOT="$SDK_ROOT"
        echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> $GITHUB_ENV
        # accept licenses and install platform-tools, platform and build-tools
        yes | "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$SDK_ROOT" "platform-tools" "platforms;android-33" "build-tools;33.0.2"

    - name: Setup Protocol Buffers compiler
      uses: arduino/setup-protoc@v3
      with:
        version: '33.x'
        repo-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable

    - name: Install Rust targets
      run: |
        rustup target add aarch64-linux-android
        rustup target add x86_64-linux-android

    - name: Setup Android NDK
      id: setup-ndk
      uses: nttld/setup-ndk@main
      with:
        ndk-version: r26d
        add-to-path: true
        link-to-sdk: true

    - name: Set NDK environment variables
      run: |
        echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV
        echo "NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Cache Cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-registry-

    - name: Cache Cargo build (release)
      uses: actions/cache@v4
      with:
        path: |
          app/src/main/rust/target
        key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-release-

    - name: Clean Rust incremental builds
      run: |
        find app/src/main/rust -type d -name incremental -exec rm -rf {} + 2>/dev/null || true
        find app/src/main/rust/target -name "*.rlib" -mtime +7 -delete 2>/dev/null || true

    - name: Decode Release Keystore
      run: |
        echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/release.keystore

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Create debug keystore
      run: |
        set -e
        KEYSTORE_PATH=${{ github.workspace }}/debug.keystore
        if [ ! -f "$KEYSTORE_PATH" ]; then
          keytool -genkeypair -v -keystore "$KEYSTORE_PATH" -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        else
          echo "debug keystore already exists"
        fi

    - name: Build Release APK (signed with debug keystore)
      run: |
        ./gradlew assembleRelease --stacktrace \
          -Pandroid.injected.signing.store.file=${{ github.workspace }}/debug.keystore \
          -Pandroid.injected.signing.store.password=android \
          -Pandroid.injected.signing.key.alias=androiddebugkey \
          -Pandroid.injected.signing.key.password=android

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/*.apk
